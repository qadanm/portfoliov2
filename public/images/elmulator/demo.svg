<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 372" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15">
  <style>
    .l { opacity: 0; }
    .a1 { animation: a1 9s infinite; }
    .a2 { animation: a2 9s infinite; }
    .a3 { animation: a3 9s infinite; }
    .a4 { animation: a4 9s infinite; }
    .a5 { animation: a5 9s infinite; }
    .a6 { animation: a6 9s infinite; }
    .cur { animation: blink 1s steps(1) infinite; }
    @keyframes a1 { 0%,4%{opacity:0} 7%,94%{opacity:1} 100%{opacity:0} }
    @keyframes a2 { 0%,16%{opacity:0} 19%,94%{opacity:1} 100%{opacity:0} }
    @keyframes a3 { 0%,26%{opacity:0} 29%,94%{opacity:1} 100%{opacity:0} }
    @keyframes a4 { 0%,34%{opacity:0} 37%,94%{opacity:1} 100%{opacity:0} }
    @keyframes a5 { 0%,42%{opacity:0} 45%,94%{opacity:1} 100%{opacity:0} }
    @keyframes a6 { 0%,54%{opacity:0} 58%,94%{opacity:1} 100%{opacity:0} }
    @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
  </style>

  <!-- window -->
  <rect x="1" y="1" width="818" height="370" rx="10" fill="#0d1117" stroke="#30363d"/>
  <rect x="1" y="1" width="818" height="38" rx="10" fill="#161b22"/>
  <rect x="1" y="28" width="818" height="11" fill="#161b22"/>
  <circle cx="22" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="20" r="6" fill="#27c93f"/>
  <text x="410" y="25" text-anchor="middle" fill="#8b949e" font-size="13">elmulator · iOS OBD2 tests in CI · no car · no adapter · no radio</text>

  <!-- body -->
  <g>
    <!-- command line -->
    <g class="l a1">
      <text x="26" y="82" fill="#58a6ff">$</text>
      <text x="46" y="82" fill="#c9d1d9">swift test</text>
      <rect class="cur" x="140" y="70" width="9" height="16" fill="#c9d1d9"/>
    </g>

    <!-- narration -->
    <text class="l a2" x="26" y="130" fill="#8b949e">◇  Testing against a scripted ELM327 · no car · no adapter · no radio</text>

    <!-- checks -->
    <g class="l a3"><text x="26" y="166"><tspan fill="#3fb950">✔</tspan><tspan fill="#c9d1d9" dx="8">connects over BLE and reads a stored P0420</tspan></text></g>
    <g class="l a4"><text x="26" y="196"><tspan fill="#3fb950">✔</tspan><tspan fill="#c9d1d9" dx="8">reassembles a reply split across many BLE notifications</tspan></text></g>
    <g class="l a5"><text x="26" y="226"><tspan fill="#3fb950">✔</tspan><tspan fill="#c9d1d9" dx="8">does not crash on malformed adapter output</tspan></text></g>

    <!-- summary -->
    <g class="l a6">
      <text x="26" y="278" font-weight="bold"><tspan fill="#3fb950">✔  3 tests passed</tspan><tspan fill="#8b949e" dx="10" font-weight="normal">·  on a plain macOS runner, zero hardware</tspan></text>
      <text x="26" y="312" fill="#6e7681" font-size="13">elmulator + CoreBluetooth-Mock · your real CBCentralManager code, a scripted adapter</text>
    </g>
  </g>
</svg>
