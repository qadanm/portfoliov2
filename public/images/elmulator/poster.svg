<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="elp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F17"/>
      <stop offset="0.6" stop-color="#0D1320"/>
      <stop offset="1" stop-color="#090C12"/>
    </linearGradient>
    <radialGradient id="elp-glow" cx="0.78" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#2f81f7" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2f81f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#elp-bg)"/>
  <rect width="1280" height="800" fill="url(#elp-glow)"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.03">
    <path d="M0 200 H1280 M0 400 H1280 M0 600 H1280"/>
    <path d="M320 0 V800 M640 0 V800 M960 0 V800"/>
  </g>

  <!-- ── Left column: identity ─────────────────────────────────────── -->
  <g transform="translate(96,250)">
    <!-- mark -->
    <rect x="0" y="0" width="92" height="92" rx="24" fill="#2f81f7"/>
    <path d="M30 30 L48 46 L30 62" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="54" y="55" width="20" height="8" rx="2" fill="#ffffff"/>

    <text x="112" y="66" font-size="66" font-weight="800" letter-spacing="-1.5" fill="#ffffff">elmulator</text>
  </g>

  <text x="98" y="422" font-size="27" font-weight="600" fill="#c9d4e5">A scriptable Bluetooth LE + TCP</text>
  <text x="98" y="458" font-size="27" font-weight="600" fill="#c9d4e5">OBD2 (ELM327) adapter emulator</text>
  <text x="98" y="500" font-size="19" fill="#7d8aa0">Test your car app in CI with no car, no adapter, no radio.</text>

  <!-- pills -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16" font-weight="600">
    <g transform="translate(98,548)">
      <rect x="0" y="0" width="96" height="34" rx="17" fill="#131b2b" stroke="#26324a"/>
      <text x="48" y="23" text-anchor="middle" fill="#9fb0c9">Swift 6</text>
    </g>
    <g transform="translate(206,548)">
      <rect x="0" y="0" width="94" height="34" rx="17" fill="#131b2b" stroke="#26324a"/>
      <text x="47" y="23" text-anchor="middle" fill="#9fb0c9">Python</text>
    </g>
    <g transform="translate(312,548)">
      <rect x="0" y="0" width="152" height="34" rx="17" fill="#131b2b" stroke="#26324a"/>
      <text x="76" y="23" text-anchor="middle" fill="#9fb0c9">GitHub Action</text>
    </g>
    <g transform="translate(476,548)">
      <rect x="0" y="0" width="64" height="34" rx="17" fill="#0f2036" stroke="#2f81f7" stroke-opacity="0.5"/>
      <text x="32" y="23" text-anchor="middle" fill="#66a6ff">MIT</text>
    </g>
  </g>

  <!-- ── Right column: terminal ────────────────────────────────────── -->
  <g transform="translate(704,196)">
    <rect x="0" y="0" width="490" height="408" rx="16" fill="#0d1117" stroke="#26324a"/>
    <rect x="0" y="0" width="490" height="44" rx="16" fill="#131a26"/>
    <rect x="0" y="30" width="490" height="14" fill="#131a26"/>
    <circle cx="26" cy="22" r="6" fill="#ff5f56"/>
    <circle cx="48" cy="22" r="6" fill="#ffbd2e"/>
    <circle cx="70" cy="22" r="6" fill="#27c93f"/>
    <text x="245" y="27" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#6d7a90">iOS OBD2 tests in CI</text>

    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="17">
      <text x="26" y="96"><tspan fill="#58a6ff">$</tspan><tspan fill="#d3dae6" dx="10">swift test</tspan></text>

      <text x="26" y="140" fill="#8b98ad" font-size="14.5">◇ scripted ELM327 · mock BLE · no radio</text>

      <text x="26" y="186"><tspan fill="#3fb950">✔</tspan><tspan fill="#c9d4e5" dx="12" font-size="15.5">connects over BLE, reads a stored P0420</tspan></text>
      <text x="26" y="224"><tspan fill="#3fb950">✔</tspan><tspan fill="#c9d4e5" dx="12" font-size="15.5">reassembles a chunked reply</tspan></text>
      <text x="26" y="262"><tspan fill="#3fb950">✔</tspan><tspan fill="#c9d4e5" dx="12" font-size="15.5">survives malformed adapter output</tspan></text>

      <line x1="26" y1="292" x2="464" y2="292" stroke="#20293a"/>

      <text x="26" y="330" font-weight="700"><tspan fill="#3fb950" font-size="18">✔  3 tests passed</tspan></text>
      <text x="26" y="360" fill="#6d7a90" font-size="14">plain macOS runner, zero hardware</text>
    </g>

    <!-- byte-parity chip -->
    <g transform="translate(322,370)">
      <rect x="0" y="0" width="142" height="28" rx="14" fill="#0f2036" stroke="#2f81f7" stroke-opacity="0.4"/>
      <text x="71" y="19" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#66a6ff">Python == Swift</text>
    </g>
  </g>
</svg>
