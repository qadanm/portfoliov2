<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 392" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- self-contained panel so all text has guaranteed contrast regardless of page theme -->
  <rect x="6" y="6" width="888" height="380" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <text x="450" y="48" text-anchor="middle" font-size="21" font-weight="700" fill="#e6edf3">One engine, every way to fake the adapter</text>

  <!-- Row 1 -->
  <!-- Card 1: in-process BLE double (flagship, accent) -->
  <rect x="44" y="80" width="252" height="120" rx="14" fill="#161b22" stroke="#2f81f7" stroke-width="2"/>
  <g transform="translate(62,95)" stroke="#2f81f7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 3 L6 25 L15 18 L6 12 M6 12 L15 5 L6 -1 Z"/>
  </g>
  <text x="62" y="150" font-size="15" font-weight="700" fill="#e6edf3">In-process BLE double</text>
  <text x="62" y="172" font-size="12.5" fill="#8b949e">Swap the real central for a fake</text>
  <text x="62" y="190" font-size="12.5" fill="#8b949e">one behind the CentralStack protocol.</text>

  <!-- Card 2: CoreBluetooth-Mock bridge -->
  <rect x="324" y="80" width="252" height="120" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <g transform="translate(342,101)" stroke="#8b949e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="5" width="17" height="12" rx="6"/>
    <rect x="12" y="5" width="17" height="12" rx="6"/>
  </g>
  <text x="342" y="150" font-size="15" font-weight="700" fill="#e6edf3">CoreBluetooth-Mock bridge</text>
  <text x="342" y="172" font-size="12.5" fill="#8b949e">Run your real CBCentralManager</text>
  <text x="342" y="190" font-size="12.5" fill="#8b949e">code under swift test, no radio.</text>

  <!-- Card 3: real BLE peripheral -->
  <rect x="604" y="80" width="252" height="120" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <g transform="translate(622,93)" stroke="#8b949e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="4" cy="20" r="2.4" fill="#8b949e" stroke="none"/>
    <path d="M10 20 A8 8 0 0 0 4 14"/>
    <path d="M16 20 A14 14 0 0 0 4 8"/>
  </g>
  <text x="622" y="150" font-size="15" font-weight="700" fill="#e6edf3">Real BLE peripheral</text>
  <text x="622" y="172" font-size="12.5" fill="#8b949e">Advertise an ELM327 on macOS and</text>
  <text x="622" y="190" font-size="12.5" fill="#8b949e">connect a physical phone on device.</text>

  <!-- Row 2 -->
  <!-- Card 4: TCP server -->
  <rect x="44" y="224" width="252" height="120" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <g transform="translate(62,237)" stroke="#8b949e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="2" width="26" height="16" rx="2"/>
    <path d="M6 22 L20 22 M13 18 L13 22"/>
  </g>
  <text x="62" y="294" font-size="15" font-weight="700" fill="#e6edf3">TCP server, any language</text>
  <text x="62" y="316" font-size="12.5" fill="#8b949e">One command, or in-process:</text>
  <text x="62" y="334" font-size="12.5" fill="#8b949e">the Simulator, Android, any socket.</text>

  <!-- Card 5: GitHub Action -->
  <rect x="324" y="224" width="252" height="120" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <g transform="translate(342,235)" stroke="#8b949e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="26" height="26" rx="6"/>
    <path d="M9 7 L18 13 L9 19 Z" fill="#8b949e" stroke="none"/>
  </g>
  <text x="342" y="294" font-size="15" font-weight="700" fill="#e6edf3">GitHub Action</text>
  <text x="342" y="316" font-size="12.5" fill="#8b949e">Serve a scenario in one step and</text>
  <text x="342" y="334" font-size="12.5" fill="#8b949e">read back the bound port.</text>

  <!-- Card 6: conformance -->
  <rect x="604" y="224" width="252" height="120" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <g transform="translate(622,236)" stroke="#8b949e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 6 L24 6 M2 6 L7 1 M2 6 L7 11"/>
    <path d="M24 18 L2 18 M24 18 L19 13 M24 18 L19 23"/>
  </g>
  <text x="622" y="294" font-size="15" font-weight="700" fill="#e6edf3">Byte-for-byte parity</text>
  <text x="622" y="316" font-size="12.5" fill="#8b949e">Python and Swift servers held in</text>
  <text x="622" y="334" font-size="12.5" fill="#8b949e">lockstep by a conformance suite.</text>
</svg>
